name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build & Test (macOS)
    runs-on: macos-15   # needs Xcode 26 (macOS 26 SDK) for the process-tap APIs the app guards with #available
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & run tests
        run: |
          xcodebuild test \
            -project SonanceEQ.xcodeproj \
            -scheme SonanceEQ \
            -destination 'platform=macOS,arch=arm64' \
            -resultBundlePath TestResults.xcresult | xcbeautify || exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
