name: CI

# Manual trigger only — macOS runners need GitHub Actions billing (10× minutes) on a private repo.
# To run automatically on every push/PR, either:
#   • enable a spending limit / payment method under Settings → Billing & plans, OR
#   • make the repo public (public repos get free macOS runners),
# then add back:  push:  /  pull_request:  under `on:`.
# Until then the local pre-commit hook (.githooks/pre-commit) is the gate; run this manually via the
# Actions tab ("Run workflow") once billing is set up.
on:
  workflow_dispatch:

jobs:
  test:
    name: Build & Test (macOS)
    runs-on: macos-15   # Xcode 16 (Swift Testing); the app only uses macOS 14.4-era Core Audio APIs
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project SonanceEQ.xcodeproj \
            -scheme SonanceEQ \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
