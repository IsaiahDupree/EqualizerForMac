name: CI

# Public repo → free macOS runners, so CI runs on every push/PR. (Private repos need Actions billing.)
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build & Test (macOS)
    runs-on: macos-15   # Xcode 16 (Swift Testing); the app only uses macOS 14.4-era Core Audio APIs
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project SonanceEQ.xcodeproj \
            -scheme SonanceEQ \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
