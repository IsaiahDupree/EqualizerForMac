name: SonanceEQ
options:
  bundleIdPrefix: com.isaiahdupree
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.0.0"

# Three configurations: Debug + Release are the direct (Developer ID) builds (private TCC SPI on,
# no sandbox). Release-MAS is the Mac App Store build (sandbox on, public permission flow).
configs:
  Debug: debug
  Release: release
  Release-MAS: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # No team set so anyone can open + run with their own signing identity.
    DEVELOPMENT_TEAM: ""

targets:
  SonanceEQ:
    type: application
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: Sources/SonanceEQ
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaiahdupree.SonanceEQ
        # PRODUCT_NAME has no space so the .app/exec match the target name (needed for TEST_HOST).
        # The user-facing name is CFBundleDisplayName ("Sonance EQ") below.
        PRODUCT_NAME: SonanceEQ
        PRODUCT_MODULE_NAME: SonanceEQ   # clean Swift module name for `@testable import SonanceEQ`
        CODE_SIGN_ENTITLEMENTS: Sources/SonanceEQ/Resources/SonanceEQ.entitlements
        # Dev builds are not sandboxed and have hardened runtime off so the
        # private TCC permission SPI (used to request system-audio capture) works.
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        # AutoEq preset DB access (Models/PresetStore.swift uses `import SQLite3`).
        OTHER_LDFLAGS: "-lsqlite3"
        # App icon (Resources/Assets.xcassets/AppIcon.appiconset, generated by Tools/generate_icon.py).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG ENABLE_TCC_SPI"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "ENABLE_TCC_SPI"
          # Don't inject the debugger-attach entitlement (com.apple.security.get-task-allow) into the
          # distribution build — notarization rejects any binary that requests it.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"
        Release-MAS:
          # Mac App Store: NO private TCC SPI (public permission flow), sandbox + hardened runtime on,
          # the MAS entitlements file. The tap loop is proven to work sandboxed (Tools/sandbox_tap_probe.swift).
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          CODE_SIGN_ENTITLEMENTS: Sources/SonanceEQ/Resources/SonanceEQ-MAS.entitlements
          ENABLE_APP_SANDBOX: YES
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"
          # Manual App Store signing — set PER-TARGET (not as a global xcodebuild arg) so the RevenueCat
          # SPM package, which can't carry a provisioning profile, isn't affected.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "3rd Party Mac Developer Application"
          PROVISIONING_PROFILE_SPECIFIER: "Sonance EQ MAS"
    info:
      path: Sources/SonanceEQ/Resources/Info.plist
      properties:
        CFBundleDisplayName: Sonance EQ
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        # Required by the Mac App Store (App Store Connect validation). Audio EQ → Music.
        LSApplicationCategoryType: public.app-category.music
        LSMinimumSystemVersion: "14.4"
        LSUIElement: false
        NSHumanReadableCopyright: "© 2026 Isaiah Dupree"
        NSAudioCaptureUsageDescription: "Sonance EQ captures your Mac's audio output so it can apply your equalizer to everything you hear, and — only when you start a recording — save that audio to a file you choose. Audio is processed on your device and is never sent anywhere."

  SonanceEQTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - Tests
    dependencies:
      - target: SonanceEQ
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaiahdupree.SonanceEQTests
        GENERATE_INFOPLIST_FILE: YES
        # PresetStore uses SQLite3; link it for the test bundle too.
        OTHER_LDFLAGS: "-lsqlite3"

schemes:
  SonanceEQ:
    build:
      targets:
        SonanceEQ: all
    test:
      targets:
        - SonanceEQTests
    run:
      config: Debug
